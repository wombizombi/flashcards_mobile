<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>

<div class="card-container">

  <!-- Deck Selector -->
  <div class="deck-selector">
    <label for="deckSelect">Select Deck:</label>
    <select id="deckSelect" onchange="switchDeck()"></select>
    <button onclick="loadFilePrompt()">Load New Deck</button>
  </div>

  <!-- Card Display -->
  <div id="card" class="card">
    <div id="mode" class="mode-label">QUESTION</div>
    <div id="text" class="card-text"></div>
    <div id="explanation" class="card-explanation"></div>
  </div>

  <!-- Progress -->
  <div id="progress" class="progress"></div>

  <!-- Navigation Buttons -->
  <div class="side-buttons">
    <button onclick="prevCard()">⬅ Prev</button>
    <button onclick="flipCard()">Flip</button>
    <button onclick="nextCard()">Next ➡</button>
  </div>

  <!-- Controls -->
  <div class="extra-controls">
    <button onclick="alphabetizeCards()">A-Z</button>
    <button onclick="shuffleCards()">Shuffle</button>
    <button onclick="randomCard()">Random</button>
    <button onclick="showExplanation()">Explain</button>
  </div>

</div>

<!-- Hidden File Input -->
<input type="file" id="loadFile" accept=".json" style="display:none;">

</body>
</html>
