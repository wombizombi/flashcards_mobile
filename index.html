<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

<div class="card-container">

  <div id="card" class="card">
    <div id="mode" class="mode-label">QUESTION</div>
    <div id="text" class="card-text"></div>
    <div id="explanation" class="card-explanation"></div>
  </div>

  <div id="progress" class="progress"></div>

  <!-- Navigation -->
  <div class="side-buttons">
    <button onclick="prev()">⬅ Prev</button>
    <button onclick="flip()">Flip</button>
    <button onclick="next()">Next ➡</button>
  </div>

  <!-- Grading -->
  <div class="extra-controls">
    <button onclick="markAgain()">Again</button>
    <button onclick="markGood()">Good</button>
    <button onclick="markEasy()">Easy</button>
    <button onclick="resetWeights()">Reset Weight</button>
  </div>

</div>

<input type="file" id="loadFile" accept=".json" style="display:none;">

</body>
</html>
